name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to publish, for example v0.1.1
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ steps.tag.outputs.value }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep zsh

      - name: Validate release candidate
        run: |
          zsh -n bin/cx libexec/codex-orbit.zsh codex-orbit.zsh
          sh -n install.sh uninstall.sh scripts/build-release-archive.sh
          python3 -m py_compile libexec/codex-orbit-shared-home.py libexec/codex-orbit-share.py libexec/codex-orbit-quota.py scripts/render-homebrew-formula.py
          ./bin/cx --help >/dev/null
          temp_home="$(mktemp -d)"
          HOME="$temp_home" ./install.sh --bin-dir "$temp_home/bin" --install-dir "$temp_home/share/codex-orbit"
          "$temp_home/bin/cx" --help >/dev/null
          mkdir -p "$temp_home/.codex-accounts/acct_001"
          printf '{"tokens":{"access_token":"test"}}\n' > "$temp_home/.codex-accounts/acct_001/auth.json"
          : > "$temp_home/.codex-accounts/acct_001/config.toml"
          HOME="$temp_home" "$temp_home/bin/cx" share export --output "$temp_home/share.tar.gz"
          import_home="$(mktemp -d)"
          HOME="$import_home" "$temp_home/bin/cx" share import "$temp_home/share.tar.gz"
          test -f "$import_home/.codex-accounts/acct_001/auth.json"
          HOME="$temp_home" ./uninstall.sh --bin-dir "$temp_home/bin" --install-dir "$temp_home/share/codex-orbit"

      - name: Build source archive
        id: build
        run: |
          eval "$(./scripts/build-release-archive.sh "$RUNNER_TEMP/dist" "${{ steps.tag.outputs.value }}")"
          echo "path=${ARCHIVE_PATH}" >> "$GITHUB_OUTPUT"
          echo "sha256=${ARCHIVE_SHA256}" >> "$GITHUB_OUTPUT"
          echo "version=${ARCHIVE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.value }}"
          archive="${{ steps.build.outputs.path }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$archive" --clobber
          else
            gh release create "$tag" "$archive" --title "$tag" --generate-notes
          fi

      - name: Render Homebrew formula
        run: |
          python3 ./scripts/render-homebrew-formula.py \
            --url "https://github.com/themuuln/codex-orbit/releases/download/${{ steps.tag.outputs.value }}/codex-orbit-${{ steps.build.outputs.version }}.tar.gz" \
            --sha256 "${{ steps.build.outputs.sha256 }}" \
            --output "$RUNNER_TEMP/codex-orbit.rb"

      - name: Validate tap token
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TAP_GITHUB_TOKEN" ]; then
            echo "TAP_GITHUB_TOKEN is required to publish themuuln/homebrew-tap." >&2
            exit 1
          fi

      - name: Checkout tap repository
        uses: actions/checkout@v5
        with:
          repository: themuuln/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Update tap formula
        env:
          VERSION: ${{ steps.build.outputs.version }}
        run: |
          cp "$RUNNER_TEMP/codex-orbit.rb" homebrew-tap/Formula/codex-orbit.rb
          cd homebrew-tap
          if git diff --quiet -- Formula/codex-orbit.rb; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/codex-orbit.rb
          git commit -m "codex-orbit ${VERSION}"
          git push origin HEAD:main
